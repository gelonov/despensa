<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>La Despensa de Kora</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1f2937">
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --fondo-noche: #0d1117; --azul-principal: #1f2937; --texto-blanco: #ffffff; --success: #22c55e; --danger: #ef4444; --whatsapp: #25D366; --borde: #30363d; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--fondo-noche); height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: var(--texto-blanco); }
        header { background: var(--azul-principal); padding: 20px; text-align: center; border-bottom: 1px solid var(--borde); position: relative; }
        header h1 { font-size: 1.5rem; font-weight: bold; }
        
        .btn-reset { position: absolute; right: 15px; top: 22px; background: none; border: none; font-size: 1.2rem; cursor: pointer; }

        .search-container { padding: 12px; background: var(--fondo-noche); }
        #buscador { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--borde); background: #161b22; color: white; outline: none; }

        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .card { background: var(--azul-principal); padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--borde); position: relative; }
        .fam-tag { font-size: 10px; background: #58a6ff; padding: 2px 8px; border-radius: 6px; font-weight: bold; }
        
        .btn-delete-item { background: none; border: none; color: var(--danger); font-size: 1.2rem; margin-left: 10px; cursor: pointer; }

        .controls { display: flex; align-items: center; gap: 15px; }
        .btn-qty { border: none; width: 42px; height: 42px; border-radius: 12px; color: white; font-weight: bold; font-size: 24px; cursor: pointer; }
        
        nav { position: fixed; bottom: 0; width: 100%; background: var(--fondo-noche); display: flex; justify-content: space-around; padding: 10px 0 25px 0; border-top: 1px solid var(--borde); }
        .nav-item { background: none; border: none; color: #8b949e; font-size: 32px; display: flex; flex-direction: column; align-items: center; }
        .nav-item span { font-size: 11px; margin-top: 4px; font-weight: 600; }
        .nav-item.active { color: #58a6ff; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; padding: 20px; align-items: center; justify-content: center; }
        .modal-content { background: var(--azul-principal); border-radius: 20px; padding: 25px; width: 100%; max-width: 400px; border: 1px solid var(--borde); overflow-y: auto; max-height: 90vh; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--borde); background: #0d1117; color: white; font-size: 16px; }
        .btn-block { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; margin-top: 10px; color: white; cursor: pointer; }
        
        #scanner-view { display: none; position: fixed; inset: 0; background: black; z-index: 200; }
        video { width: 100%; height: 60%; object-fit: cover; }
        #loading-overlay { display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<header>
    <h1>La Despensa de Kora</h1>
    <button class="btn-reset" onclick="app.borrarTodo()" title="Borrar todo">🗑️</button>
</header>

<div id="loading-overlay">
    <div style="font-size: 2rem;">⏳</div>
    <p>Leyendo Ticket...</p>
</div>

<div class="search-container">
    <input type="text" id="buscador" placeholder="🔍 Buscar producto..." oninput="app.render()">
</div>

<main id="app-render"></main>

<div id="scanner-view">
    <video id="video" autoplay muted playsinline></video>
    <div style="padding: 20px; display: flex; flex-direction: column; gap: 10px;">
        <button class="btn-block" style="background:#58a6ff" onclick="document.getElementById('file-input').click()">📁 SUBIR FOTO TICKET/CÓDIGO</button>
        <input type="file" id="file-input" accept="image/*" style="display:none" onchange="app.scanFile(event)">
        <button class="btn-block" style="background:var(--danger)" onclick="app.stopScan()">CERRAR</button>
    </div>
</div>

<div id="modal-add" class="modal">
    <div class="modal-content">
        <h3>Nuevo Producto</h3>
        <input type="text" id="p-familia" list="familias-list" placeholder="Familia (Escribe o elige)">
        <datalist id="familias-list">
            <option value="🥛 Lácteos"><option value="🍎 Fruta/Verdura"><option value="🥩 Carnes/Pescados"><option value="🌾 Despensa"><option value="🥤 Bebidas"><option value="🧼 Limpieza"><option value="🪥 Higiene">
        </datalist>
        <input type="text" id="p-nombre" placeholder="Nombre">
        <input type="number" id="p-precio" step="0.01" placeholder="Precio (€)">
        <input type="text" id="p-super" placeholder="Supermercado">
        <div style="display:flex; gap:10px">
            <input type="number" id="p-qty" placeholder="Cant."><input type="number" id="p-min" placeholder="Aviso Mín.">
        </div>
        <input type="text" id="p-barcode" placeholder="Código (opcional)">
        <button class="btn-block" style="background:var(--success)" onclick="app.guardarManual()">GUARDAR</button>
        <button class="btn-block" style="background:#484f58" onclick="app.toggleModal(false)">CANCELAR</button>
    </div>
</div>

<nav>
    <button class="nav-item active" onclick="app.cambiarVista('casa', this)">🏠<span>Casa</span></button>
    <button class="nav-item" onclick="app.toggleModal(true)">➕<span>Nuevo</span></button>
    <button class="nav-item" onclick="app.startScan()">📷<span>Scan</span></button>
    <button class="nav-item" onclick="app.cambiarVista('lista', this)">🛒<span>Lista</span></button>
</nav>

<script>
const app = {
    view: 'casa',
    inventario: JSON.parse(localStorage.getItem('despensa_kora_final')) || [],
    reader: new ZXing.BrowserMultiFormatReader(),

    init() { this.render(); },

    render() {
        const container = document.getElementById('app-render');
        const term = document.getElementById('buscador').value.toLowerCase();
        let listado = [...this.inventario];
        if (this.view === 'lista') listado = listado.filter(p => p.cantidad <= p.stockBajo);
        listado = listado.filter(p => p.nombre.toLowerCase().includes(term));

        let html = (this.view === 'lista' && listado.length > 0) ? `<button class="btn-block" style="background:var(--whatsapp); margin-bottom:20px;" onclick="app.exportarWA()">🟢 ENVIAR WHATSAPP</button>` : "";
        listado.forEach(p => {
            html += `
                <div class="card">
                    <div style="max-width:60%">
                        <span class="fam-tag">${p.familia}</span><br>
                        <strong>${p.nombre}</strong><br>
                        <small>${p.super} | ${p.precio.toFixed(2)}€</small>
                    </div>
                    <div class="controls">
                        <button class="btn-qty" style="background:var(--danger)" onclick="app.cambiarStock(${p.id}, -1)">-</button>
                        <b style="min-width:25px;text-align:center">${p.cantidad}</b>
                        <button class="btn-qty" style="background:var(--success)" onclick="app.cambiarStock(${p.id}, 1)">+</button>
                        <button class="btn-delete-item" onclick="app.borrarProducto(${p.id})">🗑️</button>
                    </div>
                </div>`;
        });
        container.innerHTML = html || `<p style="text-align:center; color:#8b949e; margin-top:40px">Sin productos</p>`;
    },

    borrarProducto(id) {
        if(confirm("¿Seguro que quieres eliminar este producto?")) {
            this.inventario = this.inventario.filter(p => p.id !== id);
            this.save(); this.render();
        }
    },

    borrarTodo() {
        if(confirm("⚠️ ¿BORRAR TODA LA DESPENSA? Esta acción no se puede deshacer.")) {
            this.inventario = [];
            this.save(); this.render();
        }
    },

    async scanFile(e) {
        const file = e.target.files; if (!file) return;
        const imgUrl = URL.createObjectURL(file);
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            const res = await this.reader.decodeFromImageUrl(imgUrl);
            this.stopScan(); this.buscarAPI(res.text);
        } catch (err) {
            const { data: { text } } = await Tesseract.recognize(imgUrl, 'spa');
            this.analizarTicket(text);
        }
        document.getElementById('loading-overlay').style.display = 'none';
    },

    analizarTicket(texto) {
        const lineas = texto.split('\n'); let sumados = 0;
        lineas.forEach(l => {
            const prod = this.inventario.find(p => l.toUpperCase().includes(p.nombre.toUpperCase()));
            if(prod) { 
                prod.cantidad += 1; 
                const pr = l.replace(',','.').match(/(\d+\.\d{2})/);
                if(pr) prod.precio = parseFloat(pr);
                sumados++;
            }
        });
        this.save(); this.render();
        alert(sumados > 0 ? `Se han sumado ${sumados} artículos.` : "No se reconoció nada del ticket.");
    },

    guardarManual() {
        const p = { id: Date.now(), familia: document.getElementById('p-familia').value || 'Varios', nombre: document.getElementById('p-nombre').value, precio: parseFloat(document.getElementById('p-precio').value) || 0, super: document.getElementById('p-super').value || 'Súper', cantidad: parseInt(document.getElementById('p-qty').value) || 0, stockBajo: parseInt(document.getElementById('p-min').value) || 1, barcode: document.getElementById('p-barcode').value };
        this.inventario.push(p); this.save(); this.toggleModal(false); this.render();
    },

    cambiarStock(id, d) {
        const p = this.inventario.find(i => i.id === id);
        p.cantidad = Math.max(0, p.cantidad + d);
        this.save(); this.render();
    },

    cambiarVista(v, btn) {
        this.view = v;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        btn.classList.add('active'); this.render();
    },

    exportarWA() {
        let msg = "*📝 LISTA DE KORA*\n\n";
        this.inventario.filter(p => p.cantidad <= p.stockBajo).forEach(p => msg += `• ${p.nombre}\n`);
        window.location.href = "https://whatsapp.com" + encodeURIComponent(msg);
    },

    save() { localStorage.setItem('despensa_kora_final', JSON.stringify(this.inventario)); },
    toggleModal(s) { document.getElementById('modal-add').style.display = s ? 'flex' : 'none'; },
    startScan() { document.getElementById('scanner-view').style.display = 'block'; },
    stopScan() { document.getElementById('scanner-view').style.display = 'none'; }
};
window.onload = () => app.init();
</script>
</body>
</html>
