<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>nykdesp</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1f2937">
    <script src="https://unpkg.com"></script>
    <style>
        :root { 
            --fondo-noche: #0d1117; 
            --azul-principal: #1f2937; 
            --texto-blanco: #ffffff;
            --success: #22c55e;
            --danger: #ef4444;
            --whatsapp: #25D366;
            --borde: #30363d;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--fondo-noche); height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: var(--texto-blanco); }

        header { 
            background: var(--azul-principal); 
            color: var(--texto-blanco); 
            padding: 20px; 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border-bottom: 1px solid var(--borde);
        }
        header h1 { 
            font-size: 1.5rem; 
            font-weight: bold; 
            letter-spacing: 0.5px;
        }

        .search-container { padding: 12px; background: var(--fondo-noche); }
        #buscador { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--borde); background: #161b22; color: white; font-size: 16px; outline: none; }

        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        
        .card { background: var(--azul-principal); padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; 
                justify-content: space-between; align-items: center; border: 1px solid var(--borde); transition: 0.3s; }
        
        .fade-out { opacity: 0; transform: translateX(30px); }
        .super-tag { font-size: 12px; background: #374151; padding: 3px 10px; border-radius: 8px; color: #cbd5e1; margin-top: 5px; display: inline-block; }

        .controls { display: flex; align-items: center; gap: 15px; }
        .btn-qty { border: none; width: 42px; height: 42px; border-radius: 12px; color: white; font-weight: bold; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .bg-red { background: var(--danger); }
        .bg-green { background: var(--success); }
        .stock-num { font-weight: bold; font-size: 18px; min-width: 25px; text-align: center; }

        nav { position: fixed; bottom: 0; width: 100%; background: var(--fondo-noche); display: flex; justify-content: space-around; 
               padding: 10px 0 25px 0; border-top: 1px solid var(--borde); }
        .nav-item { background: none; border: none; color: #8b949e; font-size: 32px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .nav-item span { font-size: 11px; margin-top: 4px; font-weight: 600; }
        .nav-item.active { color: #58a6ff; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; padding: 20px; align-items: center; justify-content: center; }
        .modal-content { background: var(--azul-principal); border-radius: 20px; padding: 25px; width: 100%; max-width: 400px; color: white; border: 1px solid var(--borde); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--borde); background: #0d1117; color: white; }
        .btn-block { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; font-size: 16px; }
        
        #scanner-view { display: none; position: fixed; inset: 0; background: black; z-index: 200; }
        video { width: 100%; height: 80%; object-fit: cover; }
    </style>
</head>
<body>

<header><h1>La Despensa de Kora</h1></header>

<div class="search-container">
    <input type="text" id="buscador" placeholder="🔍 Buscar producto..." oninput="app.render()">
</div>

<main id="app-render"></main>

<div id="scanner-view">
    <video id="video" autoplay muted playsinline></video>
    <button class="btn-block bg-red" onclick="app.stopScan()">CERRAR CÁMARA</button>
</div>

<div id="modal-add" class="modal">
    <div class="modal-content">
        <h3>Nuevo Producto</h3>
        <input type="text" id="p-nombre" placeholder="Nombre">
        <input type="number" id="p-precio" step="0.01" placeholder="Precio (€)">
        <input type="text" id="p-super" placeholder="Supermercado">
        <div style="display:flex; gap:10px">
            <input type="number" id="p-qty" placeholder="Cantidad">
            <input type="number" id="p-min" placeholder="Aviso Mín.">
        </div>
        <button class="btn-block bg-green" onclick="app.guardarManual()">GUARDAR</button>
        <button class="btn-block" style="background:#484f58; color:white;" onclick="app.toggleModal(false)">CANCELAR</button>
    </div>
</div>

<nav>
    <button id="nav-casa" class="nav-item active" onclick="app.cambiarVista('casa')">🏠<span>Casa</span></button>
    <button class="nav-item" onclick="app.toggleModal(true)">➕<span>Nuevo</span></button>
    <button class="nav-item" onclick="app.startScan()">📷<span>Scan</span></button>
    <button id="nav-lista" class="nav-item" onclick="app.cambiarVista('lista')">🛒<span>Lista</span></button>
</nav>

<script>
const app = {
    view: 'casa',
    inventario: JSON.parse(localStorage.getItem('despensa_db')) || [],
    reader: null,

    init() {
        try {
            if (typeof ZXing !== 'undefined') {
                this.reader = new ZXing.BrowserMultiFormatReader();
            }
        } catch (e) { console.error(e); }
        this.render();
    },

    render() {
        const container = document.getElementById('app-render');
        const term = document.getElementById('buscador').value.toLowerCase();
        let listado = [...this.inventario];

        if (this.view === 'lista') {
            listado = listado.filter(p => p.cantidad <= p.stockBajo);
        }

        listado = listado.filter(p => p.nombre.toLowerCase().includes(term));

        let html = (this.view === 'lista' && listado.length > 0) ? 
            `<button class="btn-block" style="background:var(--whatsapp); color:white; margin-bottom:20px;" onclick="app.exportarWA()">🟢 ENVIAR LISTA WHATSAPP</button>` : "";

        listado.forEach(p => {
            html += `
                <div class="card" id="prod-${p.id}">
                    <div>
                        <strong style="font-size:1.1rem">${p.nombre}</strong><br>
                        <span class="super-tag">${p.super}</span> <small style="color:#8b949e; margin-left:5px">${p.precio.toFixed(2)}€</small>
                    </div>
                    <div class="controls">
                        <button class="btn-qty bg-red" onclick="app.cambiarStock(${p.id}, -1)">-</button>
                        <span class="stock-num">${p.cantidad}</span>
                        <button class="btn-qty bg-green" onclick="app.cambiarStock(${p.id}, 1)">+</button>
                    </div>
                </div>`;
        });
        container.innerHTML = html || `<p style="text-align:center; color:#8b949e; margin-top:40px">No hay productos...</p>`;
    },

    cambiarVista(v) {
        this.view = v;
        document.getElementById('nav-casa').classList.toggle('active', v === 'casa');
        document.getElementById('nav-lista').classList.toggle('active', v === 'lista');
        this.render();
    },

    cambiarStock(id, delta) {
        const p = this.inventario.find(i => i.id === id);
        p.cantidad = Math.max(0, p.cantidad + delta);
        this.save();
        if (this.view === 'lista' && p.cantidad > p.stockBajo) {
            const el = document.getElementById(`prod-${id}`);
            if(el) el.classList.add('fade-out');
            setTimeout(() => this.render(), 400);
        } else { this.render(); }
    },

    async startScan() {
        document.getElementById('scanner-view').style.display = 'block';
        try {
            const videoElement = document.getElementById('video');
            await this.reader.decodeFromVideoDevice(undefined, videoElement, (res) => {
                if (res) {
                    this.stopScan();
                    this.buscarAPI(res.text);
                }
            });
        } catch (e) { 
            alert("Acceso denegado: Toca el candado en la barra de direcciones y activa la cámara."); 
            this.stopScan(); 
        }
    },

    async buscarAPI(code) {
        let ex = this.inventario.find(p => p.barcode === code);
        if (ex) { this.cambiarStock(ex.id, 1); } 
        else {
            try {
                const r = await fetch(`https://openfoodfacts.org{code}.json`);
                const d = await r.json();
                this.toggleModal(true);
                if (d.status === 1) {
                    document.getElementById('p-nombre').value = d.product.product_name || "";
                    document.getElementById('p-super').value = d.product.brands || "";
                }
            } catch (e) { this.toggleModal(true); }
        }
    },

    guardarManual() {
        const p = {
            id: Date.now(),
            nombre: document.getElementById('p-nombre').value || "Nuevo",
            precio: parseFloat(document.getElementById('p-precio').value) || 0,
            super: document.getElementById('p-super').value || "Varios",
            cantidad: parseInt(document.getElementById('p-qty').value) || 0,
            stockBajo: parseInt(document.getElementById('p-min').value) || 1
        };
        this.inventario.push(p);
        this.save(); this.toggleModal(false); this.render();
        ['p-nombre','p-precio','p-super','p-qty','p-min'].forEach(id => document.getElementById(id).value = "");
    },

    exportarWA() {
        const faltantes = this.inventario.filter(p => p.cantidad <= p.stockBajo);
        if (faltantes.length === 0) return alert("¡Tu lista de compra está vacía!");

        let msg = "*📝 LISTA DE COMPRA DE KORA*\n\n";
        let total = 0;
        faltantes.forEach(p => {
            msg += `• ${p.nombre} (${p.super}) - ${p.precio.toFixed(2)}€\n`;
            total += p.precio;
        });
        msg += `\n💰 *Total Estimado: ${total.toFixed(2)}€*`;

        const finalMsg = encodeURIComponent(msg);
        const whatsappUrl = `whatsapp://send?text=${finalMsg}`;
        const webUrl = `https://wa.me{finalMsg}`;

        // Abrir app nativa o respaldo web
        window.location.assign(whatsappUrl);
        setTimeout(() => {
            if (document.hasFocus()) window.location.assign(webUrl);
        }, 500);
    },

    save() { localStorage.setItem('despensa_db', JSON.stringify(this.inventario)); },
    toggleModal(s) { document.getElementById('modal-add').style.display = s ? 'flex' : 'none'; },
    stopScan() { if(this.reader) this.reader.reset(); document.getElementById('scanner-view').style.display = 'none'; }
};

window.onload = () => app.init();
</script>
</body>
</html>
