<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>La Despensa de Kora</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1f2937">
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        :root { --fondo-noche: #0d1117; --azul-principal: #1f2937; --texto-blanco: #ffffff; --success: #22c55e; --danger: #ef4444; --whatsapp: #25D366; --borde: #30363d; --accent: #58a6ff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--fondo-noche); height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: var(--texto-blanco); }
        header { background: var(--azul-principal); padding: 15px; text-align: center; border-bottom: 1px solid var(--borde); font-weight: bold; }
        .search-container { padding: 10px; background: var(--fondo-noche); }
        #buscador { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--borde); background: #161b22; color: white; outline: none; }
        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .card { background: var(--azul-principal); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--borde); }
        .fam-tag { font-size: 10px; background: var(--accent); padding: 2px 6px; border-radius: 4px; }
        .controls { display: flex; align-items: center; gap: 12px; }
        .btn-qty { border: none; width: 35px; height: 35px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        nav { position: fixed; bottom: 0; width: 100%; background: var(--fondo-noche); display: flex; justify-content: space-around; padding: 10px 0 20px 0; border-top: 1px solid var(--borde); }
        .nav-item { background: none; border: none; color: #8b949e; font-size: 24px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item span { font-size: 9px; margin-top: 4px; text-transform: uppercase; }
        .nav-item.active { color: var(--accent); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; padding: 20px; align-items: center; justify-content: center; }
        .modal-content { background: var(--azul-principal); border-radius: 20px; padding: 20px; width: 100%; max-height: 90vh; overflow-y: auto; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid var(--borde); background: #0d1117; color: white; }
        .btn-block { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; margin-top: 10px; color: white; cursor: pointer; }
        
        /* Gráficas y Filtros */
        .chart-row { margin-bottom: 12px; }
        .bar-container { background: #161b22; border-radius: 5px; height: 18px; width: 100%; margin-top: 5px; overflow: hidden; }
        .bar-fill { background: var(--accent); height: 100%; transition: width 0.5s; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; background: #161b22; color: #8b949e; border: 1px solid var(--borde); padding: 8px; border-radius: 8px; font-size: 11px; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .filter-group { margin-bottom: 15px; background: #161b22; padding: 10px; border-radius: 10px; }

        #scanner-view { display: none; position: fixed; inset: 0; background: black; z-index: 200; }
        video { width: 100%; height: 60%; object-fit: cover; }
        .loading-ocr { display:none; position: fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(0,0,0,0.95); padding:30px; border-radius:15px; z-index:300; text-align:center; border: 1px solid var(--accent); }
    </style>
</head>
<body>

<header id="app-title">La Despensa de Kora</header>

<div class="search-container" id="search-box">
    <input type="text" id="buscador" placeholder="🔍 Buscar producto..." oninput="app.render()">
</div>

<div id="loading" class="loading-ocr">⏳ Leyendo Ticket...<br><small>Analizando productos y precios</small></div>

<main id="app-render"></main>

<div id="scanner-view">
    <video id="video" autoplay muted playsinline></video>
    <div style="padding: 20px; display: flex; flex-direction: column; gap: 10px;">
        <button class="btn-block" style="background:var(--accent)" onclick="document.getElementById('file-input').click()">📷 FOTO TICKET O CÓDIGO</button>
        <input type="file" id="file-input" accept="image/*" style="display:none" onchange="app.procesarImagen(event)">
        <button class="btn-block bg-red" onclick="app.stopScan()">CERRAR</button>
    </div>
</div>

<div id="modal-add" class="modal">
    <div class="modal-content">
        <h3>Nuevo Producto</h3>
        <select id="p-familia">
            <option value="Lácteos">🥛 Lácteos</option>
            <option value="Fruta/Verdura">🍎 Fruta/Verdura</option>
            <option value="Carnes/Pescados">🥩 Carnes/Pescados</option>
            <option value="Despensa">🌾 Despensa</option>
            <option value="Bebidas">🥤 Bebidas</option>
            <option value="Limpieza">🧼 Limpieza</option>
            <option value="Higiene">🪥 Higiene</option>
        </select>
        <input type="text" id="p-nombre" placeholder="Nombre">
        <input type="number" id="p-precio" step="0.01" placeholder="Precio (€)">
        <input type="text" id="p-super" placeholder="Supermercado">
        <div style="display:flex; gap:10px">
            <input type="number" id="p-qty" placeholder="Stock">
            <input type="number" id="p-min" placeholder="Aviso Mín">
        </div>
        <button class="btn-block bg-green" onclick="app.guardarManual()">GUARDAR</button>
        <button class="btn-block" style="background:#484f58" onclick="app.toggleModal(false)">CANCELAR</button>
    </div>
</div>

<nav>
    <button class="nav-item active" onclick="app.setVista('casa', this)">🏠<span>Casa</span></button>
    <button class="nav-item" onclick="app.toggleModal(true)">➕<span>Nuevo</span></button>
    <button class="nav-item" onclick="app.startScan()">📷<span>Scan</span></button>
    <button class="nav-item" onclick="app.setVista('lista', this)">🛒<span>Lista</span></button>
    <button class="nav-item" onclick="app.setVista('gastos', this)">📊<span>Gastos</span></button>
</nav>

<script>
const app = {
    view: 'casa',
    subView: 'familias',
    currentFilter: new Date().toISOString().slice(0, 7), // Formato YYYY-MM
    inventario: JSON.parse(localStorage.getItem('kora_v5_inv')) || [],
    tickets: JSON.parse(localStorage.getItem('kora_v5_tickets')) || [],
    reader: new ZXing.BrowserMultiFormatReader(),

    render() {
        const container = document.getElementById('app-render');
        document.getElementById('search-box').style.display = (this.view === 'gastos') ? 'none' : 'block';

        if (this.view === 'gastos') {
            this.renderGastos(container);
            return;
        }

        const term = document.getElementById('buscador').value.toLowerCase();
        let listado = [...this.inventario];
        if (this.view === 'lista') listado = listado.filter(p => p.cantidad <= p.stockBajo);
        listado = listado.filter(p => p.nombre.toLowerCase().includes(term));

        let html = (this.view === 'lista' && listado.length > 0) ? `<button class="btn-block" style="background:var(--whatsapp); margin-bottom:15px;" onclick="app.exportarWA()">🟢 COMPARTIR LISTA</button>` : "";
        
        listado.forEach(p => {
            html += `
                <div class="card">
                    <div style="max-width:65%">
                        <span class="fam-tag">${p.familia}</span>
                        <strong style="display:block; margin-top:5px">${p.nombre}</strong>
                        <small style="color:#8b949e">${p.super} | ${p.precio.toFixed(2)}€</small>
                    </div>
                    <div class="controls">
                        <button class="btn-qty bg-red" onclick="app.cambiarStock(${p.id}, -1)">-</button>
                        <span style="font-weight:bold">${p.cantidad}</span>
                        <button class="btn-qty bg-green" onclick="app.cambiarStock(${p.id}, 1)">+</button>
                    </div>
                </div>`;
        });
        container.innerHTML = html || `<p style="text-align:center; color:#8b949e; margin-top:40px">Sin productos</p>`;
    },

    renderGastos(container) {
        document.getElementById('app-title').innerText = "Análisis de Gastos";
        let html = `
            <div class="tabs">
                <button class="tab-btn ${this.subView === 'familias' ? 'active' : ''}" onclick="app.setSubView('familias')">FAMILIAS</button>
                <button class="tab-btn ${this.subView === 'tickets' ? 'active' : ''}" onclick="app.setSubView('tickets')">TICKETS</button>
            </div>`;

        if (this.subView === 'familias') {
            const totales = {}; let granTotal = 0;
            this.inventario.forEach(p => { const g = p.precio * p.cantidad; totales[p.familia] = (totales[p.familia] || 0) + g; granTotal += g; });
            html += `<div style="text-align:center; margin-bottom:20px"><h2>${granTotal.toFixed(2)}€</h2><p>Valor de la Despensa</p></div>`;
            Object.keys(totales).sort((a,b) => totales[b] - totales[a]).forEach(f => {
                const porc = granTotal > 0 ? (totales[f]/granTotal)*100 : 0;
                html += `<div class="chart-row"><span>${f} (${totales[f].toFixed(2)}€)</span><div class="bar-container"><div class="bar-fill" style="width:${porc}%"></div></div></div>`;
            });
        } else {
            // Lógica de filtrado de tickets
            html += `<div class="filter-group"><span>Filtrar mes:</span><input type="month" id="ticket-month" value="${this.currentFilter}" onchange="app.filterTickets(this.value)"></div>`;
            
            const filtrados = this.tickets.filter(t => t.fechaISO.startsWith(this.currentFilter));
            const totalMes = filtrados.reduce((acc, t) => acc + t.total, 0);

            html += `<div style="margin-bottom:15px; text-align:right"><b>Total mes: ${totalMes.toFixed(2)}€</b></div>`;
            
            if (filtrados.length === 0) html += '<p style="text-align:center; color:#8b949e">No hay compras en este mes.</p>';
            filtrados.slice().reverse().forEach(t => {
                html += `<div class="card"><div><strong>${t.fecha}</strong><br><small>${t.super}</small></div><b style="color:var(--success)">+${t.total.toFixed(2)}€</b></div>`;
            });
        }
        container.innerHTML = html;
    },

    filterTickets(val) { this.currentFilter = val; this.render(); },

    async procesarImagen(e) {
        const file = e.target.files; if (!file) return;
        const imgUrl = URL.createObjectURL(file);
        document.getElementById('loading').style.display = 'block';
        try {
            const { data: { text } } = await Tesseract.recognize(imgUrl, 'spa');
            this.analizarTicket(text);
        } catch (err) { alert("Error al procesar"); }
        document.getElementById('loading').style.display = 'none';
    },

    analizarTicket(texto) {
        let totalT = 0; let count = 0; let tienda = "Varios";
        texto.split('\n').forEach(l => {
            this.inventario.forEach(p => {
                if (l.toUpperCase().includes(p.nombre.toUpperCase())) {
                    const match = l.replace(',','.').match(/(\d+\.\d{2})/);
                    if (match) { const pr = parseFloat(match); p.precio = pr; p.cantidad++; totalT += pr; count++; tienda = p.super; }
                }
            });
        });
        if (count > 0) {
            const hoy = new Date();
            this.tickets.push({ 
                fecha: hoy.toLocaleDateString(), 
                fechaISO: hoy.toISOString().slice(0, 10), // Guardamos ISO para filtrar fácil
                total: totalT, 
                super: tienda 
            });
            localStorage.setItem('kora_v5_tickets', JSON.stringify(this.tickets));
            this.save(); this.render();
            alert(`Registrado: ${totalT.toFixed(2)}€`);
        } else alert("Ticket no reconocido.");
    },

    guardarManual() {
        const p = {
            id: Date.now(),
            familia: document.getElementById('p-familia').value,
            nombre: document.getElementById('p-nombre').value,
            precio: parseFloat(document.getElementById('p-precio').value) || 0,
            super: document.getElementById('p-super').value || 'Súper',
            cantidad: parseInt(document.getElementById('p-qty').value) || 0,
            stockBajo: parseInt(document.getElementById('p-min').value) || 1
        };
        this.inventario.push(p); this.save(); this.toggleModal(false); this.render();
    },

    setVista(v, btn) { this.view = v; document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); btn.classList.add('active'); this.render(); },
    setSubView(sv) { this.subView = sv; this.render(); },
    cambiarStock(id, d) { const p = this.inventario.find(i => i.id === id); p.cantidad = Math.max(0, p.cantidad + d); this.save(); this.render(); },
    exportarWA() {
        let msg = "*📝 LISTA DE KORA*\n\n";
        this.inventario.filter(p => p.cantidad <= p.stockBajo).forEach(p => msg += `• ${p.nombre} (${p.familia})\n`);
        window.location.href = `https://wa.me{encodeURIComponent(msg)}`;
    },
    save() { localStorage.setItem('kora_v5_inv', JSON.stringify(this.inventario)); },
    toggleModal(s) { document.getElementById('modal-add').style.display = s ? 'flex' : 'none'; },
    startScan() { document.getElementById('scanner-view').style.display = 'block'; },
    stopScan() { document.getElementById('scanner-view').style.display = 'none'; }
};
window.onload = () => app.init();
</script>
</body>
</html>
