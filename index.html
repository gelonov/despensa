<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>nykdesp</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1f2937">
    
    <!-- LIBRERÍAS VERIFICADAS 2025 -->
    <link rel="stylesheet" href="https://jsdelivr.net">
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>

    <style>
        :root { --fondo: #0d1117; --card: #1f2937; --txt: #ffffff; --green: #22c55e; --red: #ef4444; --wa: #25D366; --border: #30363d; --blue: #58a6ff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--fondo); height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: var(--txt); }
        header { background: var(--card); padding: 18px; text-align: center; border-bottom: 1px solid var(--border); font-weight: bold; font-size: 1.4rem; }
        .search-container { padding: 10px; background: var(--fondo); }
        #buscador { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: #161b22; color: white; outline: none; }
        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 110px; }
        .card { background: var(--card); padding: 16px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        nav { position: fixed; bottom: 0; width: 100%; background: var(--fondo); display: flex; justify-content: space-around; padding: 15px 0 25px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { background: none; border: none; color: #8b949e; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 28px; transition: 0.3s; }
        .nav-item span { font-size: 10px; font-weight: bold; margin-top: 4px; text-transform: uppercase; }
        .nav-item.active { color: var(--blue); }
        .btn-qty { border: none; width: 38px; height: 38px; border-radius: 10px; color: white; font-weight: bold; font-size: 22px; cursor: pointer; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1001; padding: 20px; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); border-radius: 20px; padding: 20px; width: 100%; max-width: 400px; color: white; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--border); background: #0d1117; color: white; }
        .btn-block { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; color: white; }
        #scanner-view { display: none; position: fixed; inset: 0; background: black; z-index: 2000; }
        video { width: 100%; height: 70%; object-fit: cover; }
    </style>
</head>
<body>

<header>La Despensa de Kora</header>
<div class="search-container"><input type="text" id="buscador" placeholder="🔍 Buscar producto..." oninput="app.render()"></div>
<main id="app-render"></main>

<div id="scanner-view">
    <video id="video" autoplay muted playsinline></video>
    <div style="padding: 20px; display: flex; flex-direction: column; gap: 10px;">
        <button class="btn-block" style="background:var(--blue)" onclick="document.getElementById('file-input').click()">📷 SUBIR TICKET / CÓDIGO</button>
        <input type="file" id="file-input" accept="image/*" style="display:none" onchange="app.procesarImagen(event)">
        <button class="btn-block" style="background:var(--red)" onclick="app.stopScan()">CERRAR</button>
    </div>
</div>

<div id="modal-add" class="modal">
    <div class="modal-content">
        <h3>Nuevo Producto</h3>
        <select id="p-familia"><option value="Lácteos">Lácteos</option><option value="Despensa">Despensa</option></select>
        <input type="text" id="p-nombre" placeholder="Nombre">
        <input type="number" id="p-precio" step="0.01" placeholder="Precio (€)">
        <input type="text" id="p-super" placeholder="Supermercado">
        <div style="display:flex; gap:10px"><input type="number" id="p-qty" placeholder="Stock"><input type="number" id="p-min" placeholder="Aviso Mín"></div>
        <button class="btn-block" style="background:var(--green)" onclick="app.guardarManual()">GUARDAR</button>
        <button class="btn-block" style="background:#484f58" onclick="app.toggleModal(false)">CANCELAR</button>
    </div>
</div>

<nav>
    <button class="nav-item active" onclick="app.setVista('casa', this)"><i class="bi bi-house-door-fill"></i><span>Casa</span></button>
    <button class="nav-item" onclick="app.toggleModal(true)"><i class="bi bi-plus-circle-fill"></i><span>Nuevo</span></button>
    <button class="nav-item" onclick="app.startScan()"><i class="bi bi-camera-fill"></i><span>Scan</span></button>
    <button class="nav-item" onclick="app.setVista('lista', this)"><i class="bi bi-cart-fill"></i><span>Lista</span></button>
    <button class="nav-item" onclick="app.setVista('gastos', this)"><i class="bi bi-graph-up-arrow"></i><span>Gastos</span></button>
</nav>

<script>
const app = {
    view: 'casa',
    inventario: JSON.parse(localStorage.getItem('kora_final_v1')) || [],
    reader: null,

    init() {
        if (typeof ZXing !== 'undefined') this.reader = new ZXing.BrowserMultiFormatReader();
        this.render();
    },

    render() {
        const container = document.getElementById('app-render');
        let listado = [...this.inventario];
        if (this.view === 'lista') listado = listado.filter(p => p.cantidad <= p.stockBajo);
        
        let html = (this.view === 'lista' && listado.length > 0) ? `<button class="btn-block" style="background:var(--wa); margin-bottom:20px;" onclick="app.exportarWA()">🟢 ENVIAR WHATSAPP</button>` : "";
        
        listado.forEach(p => {
            html += `<div class="card"><div><strong>${p.nombre}</strong><br><small style="color:#8b949e">${p.super} | ${p.precio.toFixed(2)}€</small></div><div class="controls"><button class="btn-qty" style="background:var(--red)" onclick="app.cambiarStock(${p.id}, -1)">-</button><b>${p.cantidad}</b><button class="btn-qty" style="background:var(--green)" onclick="app.cambiarStock(${p.id}, 1)">+</button></div></div>`;
        });
        container.innerHTML = html || `<p style="text-align:center; color:#8b949e; margin-top:40px">Sin productos registrados</p>`;
    },

    setVista(v, btn) {
        this.view = v;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        btn.classList.add('active');
        this.render();
    },

    cambiarStock(id, d) {
        const p = this.inventario.find(i => i.id === id);
        p.cantidad = Math.max(0, p.cantidad + d);
        localStorage.setItem('kora_final_v1', JSON.stringify(this.inventario));
        this.render();
    },

    guardarManual() {
        const p = { id: Date.now(), familia: document.getElementById('p-familia').value, nombre: document.getElementById('p-nombre').value, precio: parseFloat(document.getElementById('p-precio').value) || 0, super: document.getElementById('p-super').value, cantidad: parseInt(document.getElementById('p-qty').value) || 0, stockBajo: parseInt(document.getElementById('p-min').value) || 1 };
        this.inventario.push(p); localStorage.setItem('kora_final_v1', JSON.stringify(this.inventario)); this.toggleModal(false); this.render();
    },

    async procesarImagen(e) {
        const file = e.target.files[0];
        if (!file) return;
        const imgUrl = URL.createObjectURL(file);
        try {
            const { data: { text } } = await Tesseract.recognize(imgUrl, 'spa');
            let detectados = 0;
            text.split('\n').forEach(linea => {
                this.inventario.forEach(p => {
                    if (linea.toUpperCase().includes(p.nombre.toUpperCase())) {
                        p.cantidad++; detectados++;
                    }
                });
            });
            if (detectados > 0) { localStorage.setItem('kora_final_v1', JSON.stringify(this.inventario)); this.render(); alert(`Actualizados ${detectados} productos.`); }
            else alert("No se reconoció ningún producto del ticket.");
        } catch (err) { alert("Error al leer la imagen."); }
    },

    exportarWA() {
        const faltantes = this.inventario.filter(p => p.cantidad <= p.stockBajo);
        let msg = "*LISTA DE COMPRA KORA*\n\n";
        faltantes.forEach(p => msg += `• ${p.nombre}\n`);
        const url = `https://whatsapp.com{encodeURIComponent(msg)}`;
        window.open(url, '_blank').focus();
    },

    toggleModal(s) { document.getElementById('modal-add').style.display = s ? 'flex' : 'none'; },
    startScan() { document.getElementById('scanner-view').style.display = 'block'; },
    stopScan() { document.getElementById('scanner-view').style.display = 'none'; }
};
window.onload = () => app.init();
</script>
</body>
</html>
