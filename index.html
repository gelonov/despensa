<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>nykdesp</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1f2937">
    
    <!-- LIBRERÍAS (Actualizadas 2025) -->
    <link rel="stylesheet" href="https://jsdelivr.net">
    <script src="https://jsdelivr.net"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        :root { --fondo: #0d1117; --card: #1f2937; --txt: #ffffff; --green: #22c55e; --red: #ef4444; --wa: #25D366; --border: #30363d; --blue: #58a6ff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--fondo); height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: var(--txt); }
        
        header { background: var(--card); padding: 20px; text-align: center; border-bottom: 1px solid var(--border); }
        header h1 { font-size: 1.5rem; font-weight: bold; color: var(--txt); }

        .search-container { padding: 12px; background: var(--fondo); }
        #buscador { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: #161b22; color: white; outline: none; }

        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 110px; }
        .card { background: var(--card); padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        
        nav { position: fixed; bottom: 0; width: 100%; background: var(--fondo); display: flex; justify-content: space-around; padding: 15px 0 30px 0; border-top: 1px solid var(--border); z-index: 100; }
        .nav-item { background: none; border: none; color: #8b949e; cursor: pointer; display: flex; flex-direction: column; align-items: center; text-decoration: none; }
        .nav-item i { font-size: 28px; margin-bottom: 5px; }
        .nav-item span { font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .nav-item.active { color: var(--blue); transform: scale(1.1); }

        .controls { display: flex; align-items: center; gap: 15px; }
        .btn-qty { border: none; width: 42px; height: 42px; border-radius: 12px; color: white; font-weight: bold; font-size: 24px; cursor: pointer; }
        .bg-red { background: var(--red); }
        .bg-green { background: var(--green); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1001; padding: 20px; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); border-radius: 20px; padding: 25px; width: 100%; max-width: 400px; color: white; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--border); background: #0d1117; color: white; }
        .btn-block { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; color: white; }
        
        #scanner-view { display: none; position: fixed; inset: 0; background: black; z-index: 2000; }
        video { width: 100%; height: 70%; object-fit: cover; }
        .loading-ocr { display:none; position: fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(0,0,0,0.95); padding:30px; border-radius:15px; z-index:3000; text-align:center; border: 1px solid var(--blue); }
    </style>
</head>
<body>

<header><h1>La Despensa de Kora</h1></header>

<div class="search-container" id="search-box">
    <input type="text" id="buscador" placeholder="🔍 Buscar producto..." oninput="app.render()">
</div>

<div id="loading" class="loading-ocr">⏳ Leyendo Ticket...</div>

<main id="app-render"></main>

<div id="scanner-view">
    <video id="video" autoplay muted playsinline></video>
    <div style="padding: 20px; display: flex; flex-direction: column; gap: 10px;">
        <button class="btn-block" style="background:var(--blue)" onclick="document.getElementById('file-input').click()">📷 SUBIR TICKET / CÓDIGO</button>
        <input type="file" id="file-input" accept="image/*" style="display:none" onchange="app.procesarImagen(event)">
        <button class="btn-block bg-red" onclick="app.stopScan()">CERRAR</button>
    </div>
</div>

<div id="modal-add" class="modal">
    <div class="modal-content">
        <h3>Nuevo Producto</h3>
        <select id="p-familia">
            <option value="Lácteos">Lácteos</option>
            <option value="Despensa">Despensa</option>
            <option value="Limpieza">Limpieza</option>
        </select>
        <input type="text" id="p-nombre" placeholder="Nombre">
        <input type="number" id="p-precio" step="0.01" placeholder="Precio (€)">
        <input type="text" id="p-super" placeholder="Supermercado">
        <div style="display:flex; gap:10px">
            <input type="number" id="p-qty" placeholder="Stock">
            <input type="number" id="p-min" placeholder="Aviso Mín">
        </div>
        <button class="btn-block bg-green" onclick="app.guardarManual()">GUARDAR</button>
        <button class="btn-block" style="background:#484f58" onclick="app.toggleModal(false)">CANCELAR</button>
    </div>
</div>

<nav>
    <button class="nav-item active" onclick="app.setVista('casa', this)">
        <i class="bi bi-house-door-fill"></i><span>Casa</span>
    </button>
    <button class="nav-item" onclick="app.toggleModal(true)">
        <i class="bi bi-plus-circle-fill"></i><span>Nuevo</span>
    </button>
    <button class="nav-item" onclick="app.startScan()">
        <i class="bi bi-camera-fill"></i><span>Scan</span>
    </button>
    <button class="nav-item" onclick="app.setVista('lista', this)">
        <i class="bi bi-cart-fill"></i><span>Lista</span>
    </button>
    <button class="nav-item" onclick="app.setVista('gastos', this)">
        <i class="bi bi-graph-up-arrow"></i><span>Gastos</span>
    </button>
</nav>

<script>
const app = {
    view: 'casa',
    inventario: JSON.parse(localStorage.getItem('kora_v7_inv')) || [],
    reader: null,

    init() {
        try {
            if (typeof ZXing !== 'undefined') this.reader = new ZXing.BrowserMultiFormatReader();
        } catch (e) { console.error("Error cargando scanner"); }
        this.render();
    },

    render() {
        const container = document.getElementById('app-render');
        let listado = [...this.inventario];
        if (this.view === 'lista') listado = listado.filter(p => p.cantidad <= p.stockBajo);
        
        let html = (this.view === 'lista' && listado.length > 0) ? `<button class="btn-block" style="background:var(--wa); margin-bottom:20px;" onclick="app.exportarWA()">🟢 ENVIAR WHATSAPP</button>` : "";
        
        listado.forEach(p => {
            html += `
                <div class="card">
                    <div>
                        <strong style="font-size:1.1rem">${p.nombre}</strong><br>
                        <small style="color:#8b949e">${p.super} | ${p.precio.toFixed(2)}€</small>
                    </div>
                    <div class="controls">
                        <button class="btn-qty bg-red" onclick="app.cambiarStock(${p.id}, -1)">-</button>
                        <span style="font-weight:bold; font-size:1.2rem">${p.cantidad}</span>
                        <button class="btn-qty bg-green" onclick="app.cambiarStock(${p.id}, 1)">+</button>
                    </div>
                </div>`;
        });
        container.innerHTML = html || `<p style="text-align:center; color:#8b949e; margin-top:40px">No hay productos</p>`;
    },

    setVista(v, btn) {
        this.view = v;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        btn.classList.add('active');
        this.render();
    },

    cambiarStock(id, d) {
        const p = this.inventario.find(i => i.id === id);
        p.cantidad = Math.max(0, p.cantidad + d);
        localStorage.setItem('kora_v7_inv', JSON.stringify(this.inventario));
        this.render();
    },

    guardarManual() {
        const p = {
            id: Date.now(),
            familia: document.getElementById('p-familia').value,
            nombre: document.getElementById('p-nombre').value,
            precio: parseFloat(document.getElementById('p-precio').value) || 0,
            super: document.getElementById('p-super').value,
            cantidad: parseInt(document.getElementById('p-qty').value) || 0,
            stockBajo: parseInt(document.getElementById('p-min').value) || 1
        };
        this.inventario.push(p);
        localStorage.setItem('kora_v7_inv', JSON.stringify(this.inventario));
        this.toggleModal(false);
        this.render();
    },

    toggleModal(s) { document.getElementById('modal-add').style.display = s ? 'flex' : 'none'; },
    startScan() { document.getElementById('scanner-view').style.display = 'block'; },
    stopScan() { document.getElementById('scanner-view').style.display = 'none'; },
    
    exportarWA() {
        const msg = "*LISTA DE COMPRA KORA*";
        window.location.href = `https://wa.me{encodeURIComponent(msg)}`;
    }
};
window.onload = () => app.init();
</script>
</body>
</html>
