<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Despensa Kora</title>
    <style>
        :root { --f: #0d1117; --c: #1f2937; --t: #ffffff; --s: #22c55e; --d: #ef4444; --w: #25D366; --b: #30363d; --a: #58a6ff; }
        * { box-sizing: border-box; font-family: sans-serif; margin: 0; padding: 0; }
        body { background: var(--f); color: var(--t); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--c); padding: 20px; text-align: center; border-bottom: 1px solid var(--b); font-weight: bold; font-size: 1.2rem; }
        .search { padding: 10px; }
        #busc { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--b); background: #161b22; color: white; outline: none; }
        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .card { background: var(--c); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--b); display: flex; justify-content: space-between; align-items: center; }
        .controls { display: flex; align-items: center; gap: 8px; }
        .btn { border: none; width: 35px; height: 35px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 18px; }
        .btn-del { background: none; font-size: 1.2rem; }
        nav { position: fixed; bottom: 0; width: 100%; background: var(--f); display: flex; justify-content: space-around; padding: 10px 0 25px 0; border-top: 1px solid var(--b); }
        .nav-btn { background: none; border: none; color: #8b949e; cursor: pointer; text-align: center; }
        .nav-btn.active { color: var(--a); transform: scale(1.1); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10; padding: 20px; align-items: center; justify-content: center; }
        .modal-cont { background: var(--c); padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid var(--b); background: #0d1117; color: white; }
    </style>
</head>
<body>

<header>La Despensa de Kora</header>
<div class="search"><input type="text" id="busc" placeholder="🔍 Buscar..." oninput="render()"></div>
<main id="lista"></main>

<div id="mod" class="modal">
    <div class="modal-cont">
        <h3 id="mod-tit">Nuevo Producto</h3>
        <input type="text" id="p-fam" placeholder="Familia (Lácteos, Fruta...)">
        <input type="text" id="p-nom" placeholder="Nombre">
        <input type="number" id="p-pre" step="0.01" placeholder="Precio €">
        <input type="text" id="p-sup" placeholder="Supermercado">
        <div style="display:flex; gap:5px"><input type="number" id="p-can" placeholder="Stock"><input type="number" id="p-min" placeholder="Aviso Mín"></div>
        <button onclick="guardar()" style="background:var(--s); width:100%; padding:10px; border:none; color:white; border-radius:5px; margin-top:10px; font-weight:bold;">GUARDAR</button>
        <button onclick="cerrar()" style="background:#444; width:100%; padding:10px; border:none; color:white; border-radius:5px; margin-top:5px;">CANCELAR</button>
    </div>
</div>

<nav>
    <button class="nav-btn active" id="btn-casa" onclick="cambiar('casa')">🏠<br><small>Casa</small></button>
    <button class="nav-btn" onclick="abrir()">➕<br><small>Nuevo</small></button>
    <button class="nav-btn" id="btn-lista" onclick="cambiar('lista')">🛒<br><small>Lista</small></button>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('kora_db')) || [];
    let vista = 'casa';

    function render() {
        const cont = document.getElementById('lista');
        const filtro = document.getElementById('busc').value.toLowerCase();
        let items = [...db];
        if (vista === 'lista') items = items.filter(p => p.can <= p.min);
        items = items.filter(p => p.nom.toLowerCase().includes(filtro));

        let html = (vista === 'lista' && items.length > 0) ? `<button onclick="wa()" style="width:100%; background:var(--w); color:white; padding:10px; border:none; border-radius:8px; margin-bottom:10px; font-weight:bold;">🟢 ENVIAR WHATSAPP</button>` : "";
        
        items.forEach(p => {
            html += `<div class="card">
                <div style="max-width:60%">
                    <small style="color:var(--a)">${p.fam}</small><br>
                    <strong>${p.nom}</strong><br>
                    <small>${p.can} uds | ${p.pre}€</small>
                </div>
                <div class="controls">
                    <button class="btn" style="background:var(--d)" onclick="stock(${p.id},-1)">-</button>
                    <b>${p.can}</b>
                    <button class="btn" style="background:var(--s)" onclick="stock(${p.id},1)">+</button>
                    <button class="btn-del" onclick="borrar(${p.id})">🗑️</button>
                </div>
            </div>`;
        });
        cont.innerHTML = html || '<p style="text-align:center; color:#888; margin-top:20px;">No hay productos</p>';
    }

    function guardar() {
        const p = {
            id: Date.now(),
            fam: document.getElementById('p-fam').value || 'Varios',
            nom: document.getElementById('p-nom').value,
            pre: parseFloat(document.getElementById('p-pre').value) || 0,
            sup: document.getElementById('p-sup').value || 'Súper',
            can: parseInt(document.getElementById('p-can').value) || 0,
            min: parseInt(document.getElementById('p-min').value) || 1
        };
        if(!p.nom) return alert("Pon un nombre");
        db.push(p);
        localStorage.setItem('kora_db', JSON.stringify(db));
        cerrar(); render();
    }

    function stock(id, n) {
        const p = db.find(x => x.id === id);
        p.can = Math.max(0, p.can + n);
        localStorage.setItem('kora_db', JSON.stringify(db));
        render();
    }

    function borrar(id) { if(confirm("¿Borrar?")) { db = db.filter(x => x.id !== id); localStorage.setItem('kora_db', JSON.stringify(db)); render(); } }
    function abrir() { document.getElementById('mod').style.display = 'flex'; }
    function cerrar() { document.getElementById('mod').style.display = 'none'; document.querySelectorAll('input').forEach(i => i.value=""); }
    function cambiar(v) { 
        vista = v; 
        document.getElementById('btn-casa').classList.toggle('active', v==='casa');
        document.getElementById('btn-lista').classList.toggle('active', v==='lista');
        render(); 
    }
    function wa() {
        let t = "*LISTA DE COMPRA*\n";
        db.filter(p => p.can <= p.min).forEach(p => t += "- " + p.nom + "\n");
        window.location.href = "https://whatsapp.com" + encodeURIComponent(t);
    }
    render();
</script>
</body>
</html>
