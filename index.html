<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>La Despensa de Kora</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1f2937">
    <!-- LIBRERÍAS ESTABLES -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --fondo: #0d1117; --card: #1f2937; --txt: #ffffff; --success: #22c55e; --danger: #ef4444; --whatsapp: #25D366; --borde: #30363d; --accent: #58a6ff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--fondo); height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: var(--txt); }
        
        header { background: var(--card); padding: 18px; text-align: center; border-bottom: 1px solid var(--borde); position: relative; }
        header h1 { font-size: 1.4rem; font-weight: bold; }
        .btn-reset { position: absolute; right: 15px; top: 18px; background: none; border: none; font-size: 1.4rem; cursor: pointer; }

        .search-container { padding: 10px; background: var(--fondo); }
        #buscador { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--borde); background: #161b22; color: white; outline: none; }

        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 110px; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px solid var(--borde); display: flex; justify-content: space-between; align-items: center; }
        .fam-tag { font-size: 10px; background: var(--accent); padding: 2px 8px; border-radius: 6px; font-weight: bold; margin-bottom: 4px; display: inline-block; }

        .controls { display: flex; align-items: center; gap: 8px; }
        .btn-qty { border: none; width: 38px; height: 38px; border-radius: 10px; color: white; font-weight: bold; font-size: 20px; cursor: pointer; }
        .btn-action { background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px; }

        nav { position: fixed; bottom: 0; width: 100%; background: var(--fondo); display: flex; justify-content: space-around; padding: 10px 0 25px 0; border-top: 1px solid var(--borde); z-index: 100; }
        .nav-item { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; opacity: 0.6; }
        .nav-item.active { opacity: 1; transform: scale(1.1); color: var(--accent); }
        .nav-icon { font-size: 24px; }
        .nav-label { font-size: 10px; font-weight: bold; text-transform: uppercase; color: inherit; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; padding: 20px; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); border-radius: 20px; padding: 25px; width: 100%; max-width: 400px; border: 1px solid var(--borde); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--borde); background: #0d1117; color: white; font-size: 16px; }
        .btn-block { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; margin-top: 10px; color: white; cursor: pointer; }
        
        #scanner-view { display: none; position: fixed; inset: 0; background: black; z-index: 2000; }
        video { width: 100%; height: 60%; object-fit: cover; }
        #loading-ocr { display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<header>
    <h1>La Despensa de Kora</h1>
    <button class="btn-reset" onclick="app.borrarTodo()">🗑️</button>
</header>

<div id="loading-ocr">
    <div style="font-size: 2rem;">⏳</div>
    <p>Analizando Ticket...</p>
</div>

<div class="search-container">
    <input type="text" id="buscador" placeholder="🔍 Buscar producto..." oninput="app.render()">
</div>

<main id="app-render"></main>

<div id="scanner-view">
    <video id="video" autoplay muted playsinline></video>
    <div style="padding: 20px; display: flex; flex-direction: column; gap: 10px;">
        <button class="btn-block" style="background:var(--accent)" onclick="document.getElementById('file-input').click()">📁 SUBIR FOTO TICKET/CÓDIGO</button>
        <input type="file" id="file-input" accept="image/*" style="display:none" onchange="app.scanFile(event)">
        <button class="btn-block bg-red" onclick="app.stopScan()">CERRAR</button>
    </div>
</div>

<div id="modal-add" class="modal">
    <div class="modal-content">
        <h3 id="modal-title">Nuevo Producto</h3>
        <input type="text" id="p-fam" list="familias-list" placeholder="Familia (Selecciona o escribe)">
        <datalist id="familias-list">
            <option value="🥛 Lácteos"><option value="🍎 Fruta/Verdura"><option value="🥩 Carnes"><option value="🌾 Despensa">
        </datalist>
        <input type="text" id="p-nom" placeholder="Nombre">
        <input type="number" id="p-pre" step="0.01" placeholder="Precio €">
        <input type="text" id="p-sup" placeholder="Supermercado">
        <div style="display:flex; gap:10px"><input type="number" id="p-can" placeholder="Stock"><input type="number" id="p-min" placeholder="Aviso Mín"></div>
        <input type="hidden" id="edit-id">
        <button class="btn-block" style="background:var(--success)" onclick="app.guardar()">GUARDAR</button>
        <button class="btn-block" style="background:#444" onclick="app.toggleModal(false)">CANCELAR</button>
    </div>
</div>

<nav>
    <button class="nav-item active" id="nav-casa" onclick="app.cambiarVista('casa', this)">
        <div class="nav-icon">🏠</div><div class="nav-label">Casa</div>
    </button>
    <button class="nav-item" onclick="app.toggleModal(true)">
        <div class="nav-icon">➕</div><div class="nav-label">Nuevo</div>
    </button>
    <button class="nav-item" onclick="app.startScan()">
        <div class="nav-icon">📷</div><div class="nav-label">Scan</div>
    </button>
    <button class="nav-item" id="nav-lista" onclick="app.cambiarVista('lista', this)">
        <div class="nav-icon">🛒</div><div class="nav-label">Lista</div>
    </button>
</nav>

<script>
const app = {
    view: 'casa',
    inv: JSON.parse(localStorage.getItem('kora_db_vFinal')) || [],
    reader: null,

    init() {
        if (typeof ZXing !== 'undefined') this.reader = new ZXing.BrowserMultiFormatReader();
        this.render();
    },

    render() {
        const cont = document.getElementById('app-render');
        const term = document.getElementById('buscador').value.toLowerCase();
        let list = [...this.inv];
        if (this.view === 'lista') list = list.filter(p => p.cantidad <= p.stockBajo);
        list = list.filter(p => p.nombre.toLowerCase().includes(term));

        let html = (this.view === 'lista' && list.length > 0) ? `<button class="btn-block" style="background:var(--whatsapp)" onclick="app.wa()">🟢 ENVIAR WHATSAPP</button>` : "";
        list.forEach(p => {
            html += `<div class="card">
                <div style="max-width:55%">
                    <span class="fam-tag">${p.familia}</span><br>
                    <strong>${p.nombre}</strong><br>
                    <small>${p.super} | ${p.precio.toFixed(2)}€</small>
                </div>
                <div class="controls">
                    <button class="btn-qty bg-red" onclick="app.stock(${p.id},-1)">-</button>
                    <b>${p.cantidad}</b>
                    <button class="btn-qty bg-green" onclick="app.stock(${p.id},1)">+</button>
                    <button class="btn-action" onclick="app.editar(${p.id})">✏️</button>
                    <button class="btn-action" onclick="app.borrar(${p.id})">🗑️</button>
                </div>
            </div>`;
        });
        cont.innerHTML = html || `<p style="text-align:center; color:#888; margin-top:40px">Sin productos</p>`;
    },

    guardar() {
        const id = document.getElementById('edit-id').value;
        const p = {
            familia: document.getElementById('p-fam').value || 'Varios',
            nombre: document.getElementById('p-nom').value,
            precio: parseFloat(document.getElementById('p-pre').value) || 0,
            super: document.getElementById('p-sup').value || 'Súper',
            cantidad: parseInt(document.getElementById('p-can').value) || 0,
            stockBajo: parseInt(document.getElementById('p-min').value) || 1
        };
        if(!p.nombre) return alert("Nombre obligatorio");
        if(id) {
            const idx = this.inv.findIndex(x => x.id == id);
            this.inv[idx] = { ...this.inv[idx], ...p };
        } else {
            this.inv.push({ id: Date.now(), ...p });
        }
        localStorage.setItem('kora_db_vFinal', JSON.stringify(this.inv));
        this.toggleModal(false); this.render();
    },

    editar(id) {
        const p = this.inv.find(x => x.id === id);
        document.getElementById('edit-id').value = p.id;
        document.getElementById('p-fam').value = p.familia;
        document.getElementById('p-nom').value = p.nombre;
        document.getElementById('p-pre').value = p.precio;
        document.getElementById('p-sup').value = p.super;
        document.getElementById('p-can').value = p.cantidad;
        document.getElementById('p-min').value = p.stockBajo;
        document.getElementById('modal-title').innerText = "Editar";
        this.toggleModal(true);
    },

    stock(id, d) { const p = this.inv.find(x => x.id === id); p.cantidad = Math.max(0, p.cantidad + d); this.save(); this.render(); },
    borrar(id) { if(confirm("¿Borrar?")) { this.inv = this.inv.filter(x => x.id !== id); this.save(); this.render(); } },
    borrarTodo() { if(confirm("¿RESET TOTAL?")) { this.inv = []; this.save(); this.render(); } },
    save() { localStorage.setItem('kora_db_vFinal', JSON.stringify(this.inv)); },
    toggleModal(s) { 
        if(!s) { document.getElementById('edit-id').value = ""; document.querySelectorAll('.modal-content input').forEach(i => i.value=""); }
        document.getElementById('modal-add').style.display = s ? 'flex' : 'none'; 
    },
    cambiarVista(v, b) { this.view = v; document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); b.classList.add('active'); this.render(); },
    
    async scanFile(e) {
        const f = e.target.files[0]; if(!f) return;
        document.getElementById('loading-ocr').style.display = 'flex';
        const url = URL.createObjectURL(f);
        try {
            const { data: { text } } = await Tesseract.recognize(url, 'spa');
            let c = 0;
            text.split('\n').forEach(l => {
                const p = this.inv.find(x => l.toUpperCase().includes(x.nombre.toUpperCase()));
                if(p) { p.cantidad++; c++; }
            });
            alert(`Actualizados ${c} productos.`);
        } catch(e) { alert("Error al leer"); }
        document.getElementById('loading-ocr').style.display = 'none'; this.save(); this.render();
    },

    async startScan() {
        document.getElementById('scanner-view').style.display = 'block';
        try {
            const video = document.getElementById('video');
            await this.reader.decodeFromVideoDevice(undefined, video, (res) => {
                if(res) { this.stopScan(); alert("Código: " + res.text); }
            });
        } catch(e) { alert("Error cámara"); this.stopScan(); }
    },
    stopScan() { if(this.reader) this.reader.reset(); document.getElementById('scanner-view').style.display = 'none'; },
    wa() {
        let t = "*LISTA DE COMPRA*\n";
        this.inv.filter(x => x.cantidad <= x.stockBajo).forEach(x => t += "- " + x.nombre + "\n");
        window.location.href = "https://whatsapp.com" + encodeURIComponent(t);
    }
};
window.onload = () => app.init();
</script>
</body>
</html>
